<main class="contato-page">
  <app-breadcrumb variant="bar" currentPath="Contato"></app-breadcrumb>

  <app-hero-mosaic 
    title="Fale Conosco" 
    [images]="mosaicImages">
  </app-hero-mosaic>

  <article class="minimal-contact">
    <div class="info-container animate-fade-up">
      
      <!-- Address Column -->
      <div class="info-col">
        <h2>Endereço</h2>
        <p class="address-text">
          Rua Almirante Custódio de Melo, s/n,<br>
          Jacuecanga, Angra dos Reis - RJ
        </p>
      </div>

      <!-- Contacts Column -->
      <div class="info-col">
        <h2>Contatos</h2>
        
        <div class="contact-row">
          <span class="label">Telefone / WhatsApp</span>
          <a href="tel:24974010894" class="value">+55 (24) 97401-0894</a>
        </div>

        <div class="contact-row">
          <span class="label">Email</span>
          <a href="mailto:gemarcornelisverolme@gmail.com" class="value">gemarcornelisverolme@gmail.com</a>
        </div>

        <div class="contact-row">
          <span class="label">Instagram</span>
          <a href="https://www.instagram.com/27gemar/" target="_blank" rel="noopener noreferrer" class="value">@27gemar</a>
        </div>
      </div>

      <!-- Schedule Column -->
      <div class="info-col">
        <h2>Funcionamento</h2>
        
        <div class="schedule-row">
          <span class="days">Atividades (Sáb):</span>
          <span class="hours">09:00 &mdash; 12:30</span>
        </div>
      </div>

    </div>

    <div class="map-full animate-fade-up">
      <app-map height="450px"></app-map>
    </div>
  </article>
</main>
